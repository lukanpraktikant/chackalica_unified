# Fleet manager stack.
#
#   docker compose up -d postgres redis      # infra only (run web+worker locally)
#   docker compose up -d                      # full stack
#
# The web process and the rq worker share the same image and env. The worker
# mounts the host docker socket so it can start/stop Label Studio containers,
# and both mount data/ so the webhook + sync can read source / write target.
x-app: &app
  build: .
  environment:
    POSTGRES_HOST: postgres
    POSTGRES_DB: fleet
    POSTGRES_USER: fleet
    POSTGRES_PASSWORD: fleet
    REDIS_URL: redis://redis:6379/0
    DJANGO_DEBUG: "true"
    # Containers reach the host-published webhook + Label Studio via the gateway.
    FLEET_LS_HOST: host.docker.internal
    # The worker provisions sibling containers via the host docker daemon, so
    # bind-mount sources must be host paths. ${PWD} is the project dir at
    # `docker compose up` time.
    FLEET_HOST_DATA_DIR: ${PWD}/data
  volumes:
    - ./data:/app/data
    - /var/run/docker.sock:/var/run/docker.sock
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fleet
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    ports:
      - "5432:5432"
    volumes:
      - fleet-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    <<: *app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn fleetsite.wsgi:application --bind 0.0.0.0:9000"
    # Published on 9000 so it inherits the coco-sync webhook's host port: Label
    # Studio containers keep hitting http://host.docker.internal:9000/hook.
    ports:
      - "9000:9000"

  worker:
    <<: *app
    command: python manage.py rqworker default

volumes:
  fleet-postgres:
