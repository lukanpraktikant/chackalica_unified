# Friendy Chachkalica config reference.
# Every uncommented field in this file is implemented and valid with the current code.
# This lists all first-class config fields. Model, optimizer, and scheduler mappings
# also accept extra keyword arguments through params or direct extra keys, which are
# passed to the selected adapter, torch optimizer, or torch scheduler.
# Copy this file to configs/experiment.yaml and edit paths/classes for your project.

# Required. Human-readable experiment name.
name: helmet-benchmark

# Optional. Defaults to runs/<name> if omitted.
# Relative paths are resolved relative to this YAML file.
output_dir: ../runs/helmet-benchmark

# Required. Dataset definitions.
# datasets.train is the dataset comparison axis.
# Every train dataset is paired with every model under models.
datasets:
  # Required. One dataset mapping or a list of dataset mappings.
  train:
    - name: field-v1
      images: ../datasets/field-v1/images/train
      labels: ../datasets/field-v1/labels/train
      classes: [helmet, head, vest]
      # Optional (train datasets only). Each value is the fraction of samples the
      # augmentation is applied to per epoch (0-1). Omit or 0 to disable.
      augmentation:
        hflip: 0.5        # random horizontal flip (boxes mirrored)
        scale_crop: 0.3   # random 60-100% crop resized back; boxes clipped/dropped at edges

    - name: warehouse-v2
      images: ../datasets/warehouse-v2/images/train
      labels: ../datasets/warehouse-v2/labels/train
      classes: [helmet, head, vest]

  # Optional. Used for validation loss, best.pt selection, and validation metrics.
  val:
    name: field-v1-val
    images: ../datasets/field-v1/images/val
    labels: ../datasets/field-v1/labels/val
    classes: [helmet, head, vest]

  # Optional. Used for final test metrics.
  test:
    name: holdout
    images: ../datasets/holdout/images/test
    labels: ../datasets/holdout/labels/test
    classes: [helmet, head, vest]

# Required. Model definitions.
# Every model is paired with every dataset under datasets.train.
# num_classes: auto resolves to len(classes) for the current train dataset/run.
models:
  # RetinaNet via torchvision.
  - name: retinanet
    num_classes: auto
    variant: resnet50_fpn_v2
    weights_backbone: DEFAULT
    weights: null
    trainable_backbone_layers: null
    # params: {}

  # YOLOX via vendored vendor/yolox code.
  - name: yolox
    num_classes: auto
    variant: yolox-s
    weights: null
    score_threshold: 0.3
    nms_threshold: 0.45
    act: silu
    # params: {}

  # RT-DETR via transformers.
  - name: rtdetr
    num_classes: auto
    weights: PekingU/rtdetr_r50vd
    score_threshold: 0.5
    image_mean: [0.485, 0.456, 0.406]
    image_std: [0.229, 0.224, 0.225]
    input_max_size: 640
    ignore_mismatched_sizes: true
    # params: {}

  # RF-DETR (Roboflow) via the Apache-2.0 `rfdetr` package — free for commercial use.
  - name: rfdetr
    num_classes: auto
    variant: base          # nano | small | medium | base | large (all Apache-2.0)
    weights: true          # true = COCO-pretrained fine-tune; false/null = from scratch
    score_threshold: 0.5
    # resolution: 560       # optional; defaults to the variant's native resolution
    # params: {}

# Optional. Training settings.
training:
  epochs: 100
  batch_size: 4
  num_workers: 4
  device: auto
  seed: 42
  amp: false
  gradient_clip_norm: null

  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
    params: {}

  # Use null to disable scheduling.
  scheduler: null

# Optional. Evaluation and metric settings.
evaluation:
  batch_size: 4
  num_workers: 4
  score_threshold: 0.001
  iou_thresholds: [0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]

# Other implemented options you can use by replacing fields above:
#
# Dataset:
# - images is the image directory for this dataset role.
# - labels is the matching YOLO label directory for this dataset role.
# - classes can be a list: [helmet, head, vest]
# - classes can also be a mapping: {0: helmet, 1: head, 2: vest}
# - Class IDs may differ between train and val/test datasets as long as names match.
# - Metrics are computed in the val/test class space; predictions for extra train-only
#   classes are ignored during val/test evaluation.
# - name is optional. If omitted, it defaults to the images directory name.
# - Dataset role is inferred from the section: train, val, or test.
# - weight is parsed but intentionally unused because datasets are independent runs.
#
# RetinaNet variants:
# - variant: resnet50_fpn
# - variant: resnet50_fpn_v2
# - weights: DEFAULT
# - weights_backbone: DEFAULT
# - trainable_backbone_layers: 0..5
# - extra direct keys or params entries are passed to the torchvision RetinaNet builder.
#
# YOLOX variants:
# - variant: yolox-nano
# - variant: yolox-tiny
# - variant: yolox-s
# - variant: yolox-m
# - variant: yolox-l
# - variant: yolox-x
# - act and other extra direct keys or params entries are passed to the vendored YOLOX builder.
#
# Models:
# - name selects an adapter registered in registry.py. Currently: retinanet, yolox, rtdetr, rfdetr.
# - num_classes: auto uses the current train dataset class count for each run.
# - num_classes can also be a positive integer when every train dataset uses the same class count.
# - params can hold adapter-specific keyword arguments. Direct extra model keys are also accepted
#   and are merged with params, with params taking precedence on duplicate keys.
#
# RT-DETR:
# - weights: true uses the default PekingU/rtdetr_r50vd checkpoint.
# - weights: false or null builds from config without pretrained weights.
# - id2label and label2id are supported as mappings if you need custom class names.
# - extra direct keys or params entries are passed to RTDetrConfig or from_pretrained.
#
# RF-DETR:
# - variant: nano | small | medium | base | large (all Apache-2.0, free for commercial use).
# - variant: xlarge / 2xlarge are intentionally REJECTED — they are rfdetr[plus] (PML 1.0),
#   not free for commercial use.
# - weights: true fine-tunes from the variant's published COCO-pretrained Apache checkpoint.
# - weights: a string is treated as an explicit checkpoint path.
# - weights: false or null trains from scratch.
# - resolution overrides the square input size; defaults to the variant's native resolution.
# - extra direct keys or params entries are passed to the RF-DETR ModelConfig.
#   Example:
#   id2label: {0: helmet, 1: head, 2: vest}
#   label2id: {helmet: 0, head: 1, vest: 2}
#
# Optimizers:
# - name: adamw
# - name: adam
# - name: sgd
# - optimizer can also be just a string, for example: optimizer: adamw
# - params and extra direct keys are passed to the selected torch optimizer.
#
# Schedulers:
# - scheduler can be null or false to disable scheduling.
# - scheduler can also be just a string, for example: scheduler: cosine
# - params and extra direct keys are passed to the selected torch scheduler.
# - supported aliases include step/step_lr/steplr, multistep/multi_step/multi_step_lr/multisteplr,
#   cosine/cosine_annealing/cosine_annealing_lr, and exponential/exponential_lr.
#
# Scheduler examples:
# scheduler:
#   name: step
#   step_size: 30
#   gamma: 0.1
#
# scheduler:
#   name: multistep
#   milestones: [60, 80]
#   gamma: 0.1
#
# scheduler:
#   name: cosine
#   T_max: 100
#
# scheduler:
#   name: exponential
#   gamma: 0.95
