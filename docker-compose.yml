# ─────────────────────────── Unified Chachkalica stack ───────────────────────────
# Brings up the whole system with a single command:
#
#   docker compose up -d
#
# Services:
#   postgres  – fleet state          redis    – RQ job queue
#   web       – Django admin+webhook  worker   – RQ background jobs (provisions
#                                                 Label Studio containers)
#   trainer   – friendy_chachkalica FastAPI torch training service
#
# web/worker build from ./chachkalica, trainer from ./friendy_chachkalica. Each
# subproject still keeps its own Dockerfile + docker-compose.yml for standalone use.
#
# THE SHARED FILESYSTEM: Django writes training-config YAMLs with ABSOLUTE paths
# under its BASE_DIR (/app/data/...). The trainer receives those strings over HTTP
# and opens them as-is, so it must expose the very same files at the very same path.
# All three app containers therefore bind-mount ./chachkalica/data at /app/data.
# All run as the container-default user (root) so files written by one are readable
# by the others — matching the standalone chachkalica stack.

x-app: &app
  build: ./chachkalica
  environment:
    POSTGRES_HOST: postgres
    POSTGRES_DB: fleet
    POSTGRES_USER: fleet
    POSTGRES_PASSWORD: fleet
    REDIS_URL: redis://redis:6379/0
    DJANGO_DEBUG: "true"
    # Containers reach the host-published webhook + Label Studio via the gateway.
    FLEET_LS_HOST: host.docker.internal
    # The worker provisions sibling Label Studio containers via the host docker
    # daemon, so bind-mount sources must be HOST paths. ${PWD} is this dir at
    # `docker compose up` time; the Django data lives one level down.
    FLEET_HOST_DATA_DIR: ${PWD}/chachkalica/data
    # Reach the trainer by its compose service name on the shared network. This
    # overrides the TrainingSettings.service_base_url DB default (localhost:8200)
    # without an admin edit.
    TRAINING_SERVICE_URL: http://trainer:8200
  volumes:
    - ./chachkalica/data:/app/data
    - /var/run/docker.sock:/var/run/docker.sock
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fleet
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    ports:
      - "5432:5432"
    volumes:
      - fleet-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    <<: *app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn fleetsite.wsgi:application --bind 0.0.0.0:9000"
    # Published on 9000 so it inherits the webhook's host port: Label Studio
    # containers keep hitting http://host.docker.internal:9000/hook.
    ports:
      - "9000:9000"

  worker:
    <<: *app
    command: python manage.py rqworker default

  trainer:
    build: ./friendy_chachkalica
    environment:
      FC_PORT: ${FC_PORT:-8200}
      # Single-GPU safety: refuse a second concurrent launch with HTTP 409.
      FC_MAX_CONCURRENT: ${FC_MAX_CONCURRENT:-1}
    # PyTorch DataLoader workers pass image batches through /dev/shm; Docker's
    # default 64 MB is far too small. Bump higher for many workers / large batches.
    shm_size: ${FC_SHM_SIZE:-2gb}
    ports:
      - "${FC_PORT:-8200}:${FC_PORT:-8200}"
    volumes:
      # Same host data dir at the same container path as web/worker — see the
      # SHARED FILESYSTEM note above. source/ is a read-only input subtree.
      - ./chachkalica/data:/app/data
      - ./chachkalica/data/source:/app/data/source:ro
    restart: unless-stopped

    # ───────────────────────────────── GPU ─────────────────────────────────
    # Requires the NVIDIA Container Toolkit on the host. Uncomment to expose the
    # GPU(s); without it, device 'auto' falls back to CPU.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  fleet-postgres:
